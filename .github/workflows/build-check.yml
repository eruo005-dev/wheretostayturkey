name: Build check

# Validates that the site builds cleanly on every push and pull request.
# Vercel handles actual deployment via its native Git integration.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Validate config
        run: node -e "const c = require('./site.config'); if (!c.business || !c.affiliates) throw new Error('config malformed');"

      - name: Validate JSON data files
        run: |
          for f in data/cities*.json data/lead-magnet-*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || exit 1
            echo "  OK: $f"
          done

      - name: Build site
        run: node build.js

      - name: Verify expected pages exist
        run: |
          test -f site/index.html
          test -f site/sitemap.xml
          test -f site/robots.txt
          test -f site/feed.xml
          test -f site/404.html
          test -f site/privacy/index.html
          test -f site/terms/index.html
          test -f site/planner/index.html
          test -f site/quiz/index.html
          test -f site/editorial-standards/index.html
          test -f site/ads.txt
          test $(find site -name '*.html' | wc -l) -gt 200
          echo "✓ Build verified"

      - name: ads.txt format check (must be `pub-`, not `ca-pub-`)
        run: |
          if grep -q '^google\.com, ca-pub-' site/ads.txt; then
            echo "::error::ads.txt has 'ca-pub-' prefix — AdSense will flag it Unauthorized. Strip the 'ca-' prefix."
            exit 1
          fi
          grep -E '^google\.com, pub-[0-9]+, DIRECT, [a-f0-9]+' site/ads.txt
          echo "✓ ads.txt format OK"

      - name: Broken internal links
        run: node scripts/broken-link-check.js

      - name: Accessibility (WCAG 2.2 AA, severe-only)
        run: node scripts/a11y-survey.js

      - name: Performance budget (HTML/CSS/JS sizes)
        run: node scripts/perf-budget.js

      - name: SEO survey (informational, doesn't fail)
        run: node scripts/seo-survey.js || echo "::warning::SEO survey reported issues (non-blocking)"
